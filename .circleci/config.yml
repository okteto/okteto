      - e2e-okteto-test:
          requires:
            - test-e2e-setup
      - e2e-gateway:
          requires:
            - test-e2e-setup
      - e2e-build-windows:
          requires:
            - test-e2e-setup
      - e2e-deploy-windows:
          requires:
            - test-e2e-setup
      - e2e-up-windows:
