# https://circleci.com/docs/2.1/configuration-reference/
version: 2.1

aliases:
  - &init-gcloud |
    echo $GCLOUD_SERVICE_KEY | gcloud auth activate-service-account --key-file=-
    gcloud --quiet config set project ${GOOGLE_PROJECT_ID}
    gcloud --quiet config set compute/zone ${GOOGLE_COMPUTE_ZONE}
  # standard semver regex as defined in: https://semver.org/
  - &release-regex /^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:-((?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*)(?:\.(?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*))*))?(?:\+([0-9a-zA-Z-]+(?:\.[0-9a-zA-Z-]+)*))?$/
  - &release-branch-regex /^release-\d+\.\d+$/
  - &docker-login echo "$DOCKER_PASS" | docker login -u "$DOCKER_USER" --password-stdin
  - &github-packages-login echo "$GITHUB_PACKAGES_OKTETOBOT_TOKEN" | docker login ghcr.io -u "oktetobot" --password-stdin
  - &install-cli curl https://get.okteto.com -sSfL | sh

parameters:
  # The following parameters are filled by GH Actions to run CircleCI jobs
  GHA_Actor:
    type: string
    default: ""
  GHA_Action:
    type: string
    default: ""
  GHA_Event:
    type: string
    default: ""
  GHA_Meta:
    type: string
    default: ""

orbs:
  # https://circleci.com/developer/orbs/orb/circleci/windows#usage-run_windows_2022
  # https://circleci.com/developer/machine/image/windows-server-2022-gui
  win: circleci/windows@5.0.0

executors:
  golang-ci:
    docker:
      - image: okteto/golang-ci:2.9.0
    environment:
      OKTETO_CONTEXT: https://okteto.integration.dev.okteto.net
      OKTETO_APPS_SUBDOMAIN: integration.dev.okteto.net
      OKTETO_NAMESPACE_PREFIX: integration
      OKTETO_SKIP_CLUSTER_CLI_VERSION: true

jobs:
  golangci-lint:
    executor: golang-ci
    resource_class: large
    steps:
      - checkout:
          method: blobless
      - restore_cache:
          keys:
            - golangci-lint-cache-v2-{{ checksum ".golangci.yml" }}-{{ checksum "go.sum" }}
      - run: golangci-lint run -v --timeout 5m
      - save_cache:
          key: golangci-lint-cache-v2-{{ checksum ".golangci.yml" }}-{{ checksum "go.sum" }}
          paths:
            - ~/.cache/golangci-lint
            - ~/.cache/go-build

  build-binaries:
    executor: golang-ci
    resource_class: large
    steps:
      - checkout:
          method: blobless
      - restore_cache:
          keys:
            - v1-bin-pkg-cache-{{ checksum "go.sum" }}
      - run:
          name: Build all binaries
          command: env VERSION_STRING=$CIRCLE_TAG make -j 3 build-all
      - run:
          name: Add version string
          command: env VERSION_STRING=$CIRCLE_TAG make latest
      - save_cache:
          key: v1-bin-pkg-cache-{{ checksum "go.sum" }}
          paths:
            - ~/.cache/go-build
            - /go/pkg
      - persist_to_workspace:
          root: .
          paths:
            - bin
      - store_artifacts:
          path: bin
          destination: binaries

  check-schema:
    executor: golang-ci
    steps:
      - checkout:
          method: blobless
      - attach_workspace:
          at: ./artifacts
      - run:
          name: Check schema.json is up to date
          command: |
            ./artifacts/bin/okteto-Linux-x86_64 generate-schema -o schema.json.new
            if ! cmp -s schema.json.new schema.json; then
              echo "Error: schema.json is not up to date"
              echo "Please run 'okteto generate-schema -o schema.json' and commit the changes"
              diff schema.json.new schema.json || true
              exit 1
            fi
            rm schema.json.new

  run-unit-test:
    executor: golang-ci
    steps:
      - checkout:
          method: full
      - restore_cache:
          keys:
            - v4-pkg-cache-{{ checksum "go.sum" }}
      - run:
          name: Compile integration tests
          command: make build-integration
      - run:
          name: Test
          command: |
            make test
            bash <(curl -s https://codecov.io/bash)
      - save_cache:
          key: v4-pkg-cache-{{ checksum "go.sum" }}
          paths:
            - ~/.cache/go-build
            - /go/pkg
      - store_artifacts:
          path: coverage.txt
          destination: coverage.txt

  run-windows-unit-test:
    executor:
      # https://circleci.com/developer/machine/image/windows-server-2022-gui
      name: win/server-2022
      version: 2024.04.1
    steps:
      - checkout:
          method: blobless
      - run:
          name: Check Golang version
          command: go version
      - restore_cache:
          keys:
            - v5-pkg-cache-windows-1-15-{{ checksum "go.sum" }}
      - run:
          name: Run unit tests
          command: |
            go mod download
            go version
            go test ./...

  e2e-actions:
    executor: golang-ci
    steps:
      - checkout:
          method: blobless
      - restore_cache:
          keys:
            - v4-pkg-cache-{{ checksum "go.sum" }}
      - attach_workspace:
          at: ./artifacts
      # Install the latest CLI public available, as the actions tests uses the installed version to checkout the action branch to test
      - run: *install-cli
      - run:
          name: Run actions integration tests
          command: |
            export OKTETO_PATH=$(pwd)/artifacts/bin/okteto-Linux-x86_64
            $(pwd)/artifacts/bin/okteto-Linux-x86_64 context use $OKTETO_CONTEXT --token ${OKTETO_API_INTEGRATION_TOKEN}
            make integration-actions

  e2e-build:
    executor: golang-ci
    steps:
      - checkout:
          method: blobless
      - restore_cache:
          keys:
            - v4-pkg-cache-{{ checksum "go.sum" }}
      - attach_workspace:
          at: ./artifacts
      - run:
          name: Run build integration tests
          command: |
            export OKTETO_PATH=$(pwd)/artifacts/bin/okteto-Linux-x86_64
            $(pwd)/artifacts/bin/okteto-Linux-x86_64 context use $OKTETO_CONTEXT --token ${OKTETO_API_INTEGRATION_TOKEN}
            make integration-build

  e2e-deploy:
    executor: golang-ci
    steps:
      - checkout:
          method: blobless
      - restore_cache:
          keys:
            - v4-pkg-cache-{{ checksum "go.sum" }}
      - attach_workspace:
          at: ./artifacts
      - run:
          name: Run deploy integration tests
          # This command exports a variable to use the CLI built in the commit, so the test runs against the branch code
          command: |
            export OKTETO_PATH=$(pwd)/artifacts/bin/okteto-Linux-x86_64
            export OKTETO_CLI_IMAGE=okteto.global/cli-e2e:${CIRCLE_SHA1}
            echo "OKTETO_CLI_IMAGE=$OKTETO_CLI_IMAGE"
            $(pwd)/artifacts/bin/okteto-Linux-x86_64 context use $OKTETO_CONTEXT --token ${OKTETO_API_INTEGRATION_TOKEN}
            make integration-deploy

  e2e-up:
    executor: golang-ci
    steps:
      - checkout:
          method: blobless
      - restore_cache:
          keys:
            - v4-pkg-cache-{{ checksum "go.sum" }}
      - attach_workspace:
          at: ./artifacts
      - run:
          name: Run up integration tests
          command: |
            export OKTETO_PATH=$(pwd)/artifacts/bin/okteto-Linux-x86_64
            export OKTETO_CLI_IMAGE=okteto.global/cli-e2e:${CIRCLE_SHA1}
            echo "OKTETO_CLI_IMAGE=$OKTETO_CLI_IMAGE"
            $(pwd)/artifacts/bin/okteto-Linux-x86_64 context use $OKTETO_CONTEXT --token ${OKTETO_API_INTEGRATION_TOKEN}
            make integration-up
          environment:
            OKTETO_SKIP_CLEANUP: "true"

  e2e-okteto:
    executor: golang-ci
    steps:
      - checkout:
          method: blobless
      - restore_cache:
          keys:
            - v4-pkg-cache-{{ checksum "go.sum" }}
      - attach_workspace:
          at: ./artifacts
      - run:
          name: Run okteto integration tests
          command: |
            export OKTETO_PATH=$(pwd)/artifacts/bin/okteto-Linux-x86_64
            export OKTETO_CLI_IMAGE=okteto.global/cli-e2e:${CIRCLE_SHA1}
            echo "OKTETO_CLI_IMAGE=$OKTETO_CLI_IMAGE"
            $(pwd)/artifacts/bin/okteto-Linux-x86_64 context use $OKTETO_CONTEXT --token ${OKTETO_API_INTEGRATION_TOKEN}
            make integration-okteto

  e2e-okteto-test:
    executor: golang-ci
    steps:
      - checkout:
          method: blobless
      - restore_cache:
          keys:
            - v4-pkg-cache-{{ checksum "go.sum" }}
      - attach_workspace:
          at: ./artifacts
      - run:
          name: Run okteto test integration tests
          command: |
            export OKTETO_PATH=$(pwd)/artifacts/bin/okteto-Linux-x86_64
            export OKTETO_CLI_IMAGE=okteto.global/cli-e2e:${CIRCLE_SHA1}
            echo "OKTETO_CLI_IMAGE=$OKTETO_CLI_IMAGE"
            $(pwd)/artifacts/bin/okteto-Linux-x86_64 context use $OKTETO_CONTEXT --token ${OKTETO_API_INTEGRATION_TOKEN}
            make integration-okteto-test

  e2e-gateway:
    executor: golang-ci
    steps:
      - checkout:
          method: blobless
      - restore_cache:
          keys:
            - v4-pkg-cache-{{ checksum "go.sum" }}
      - attach_workspace:
          at: ./artifacts
      - run:
          name: Run gateway integration tests
          command: |
            export OKTETO_PATH=$(pwd)/artifacts/bin/okteto-Linux-x86_64
            $(pwd)/artifacts/bin/okteto-Linux-x86_64 context use $OKTETO_CONTEXT --token ${OKTETO_API_INTEGRATION_TOKEN}
            make integration-gateway

  test-e2e-setup:
    executor: golang-ci
    steps:
      - checkout:
          method: blobless
      - restore_cache:
          keys:
            - v4-pkg-cache-{{ checksum "go.sum" }}
      - attach_workspace:
          at: ./artifacts
      - run:
          # As the integration test running the okteto deploy needs the CLI which we are testing, we build the current
          # CLI to the okteto.dev registry, so it is available for the user running the tests. Then, in the step
          # which run the deploy, we set the env var OKTETO_CLI_IMAGE to the one we are building
          name: Build Dockerfile for current commit
          command: |
            $(pwd)/artifacts/bin/okteto-Linux-x86_64 context use $OKTETO_CONTEXT --token ${OKTETO_API_INTEGRATION_TOKEN}
            $(pwd)/artifacts/bin/okteto-Linux-x86_64 build --platform "linux/amd64" --build-arg VERSION_STRING=$CIRCLE_SHA1 -f Dockerfile . -t okteto.global/cli-e2e:${CIRCLE_SHA1}
      - save_cache:
          key: v4-pkg-cache-{{ checksum "go.sum" }}
          paths:
            - ~/.cache/go-build
            - /go/pkg

  test-release:
    executor: golang-ci
    steps:
      - checkout:
          method: blobless
      - attach_workspace:
          at: ./artifacts
      - add_ssh_keys:
          fingerprints:
            # This key belongs to oktetobot user in GitHub
            - SHA256:+wgdECJJEEyF/iyl8Y8EV/tpOEQIv6zZ/0LRqRChS18
      - run:
          name: Update brew formula
          command: |
            sha=$(cat ./artifacts/bin/okteto-Darwin-x86_64.sha256 | awk '{print $1}')
            sha_arm=$(cat ./artifacts/bin/okteto-Darwin-arm64.sha256 | awk '{print $1}')
            ./scripts/update_homebrew_formula.sh 0.0.1 $sha $sha_arm
      - run:
          name: Build Docker container
          command: |
            depot build --platform "linux/arm64,linux/amd64" --build-arg VERSION_STRING=$CIRCLE_SHA1 -f Dockerfile .

  e2e-build-windows:
    executor:
      name: win/server-2022
      version: 2024.04.1
    environment:
      OKTETO_CONTEXT: https://okteto.integration.dev.okteto.net
      OKTETO_APPS_SUBDOMAIN: integration.dev.okteto.net
      OKTETO_NAMESPACE_PREFIX: integration
      OKTETO_SKIP_CLUSTER_CLI_VERSION: true
    steps:
      - checkout:
          method: blobless
      - restore_cache:
          keys:
            - v5-pkg-cache-windows-1-15-{{ checksum "go.sum" }}
      - attach_workspace:
          at: .\artifacts
      - run:
          name: Run build integration tests
          environment:
            OKTETO_SKIP_CLEANUP: "true"
          command: |
            $env:OKTETO_PATH="$($HOME)\project\artifacts\bin\okteto.exe"
            $env:Path+=";$($HOME)\project\artifacts\bin"
            & "$($HOME)\project\artifacts\bin\okteto.exe" context use $env:OKTETO_CONTEXT --token $env:OKTETO_API_INTEGRATION_TOKEN
            go test github.com/okteto/okteto/integration/build -tags="integration" --count=1 -v -timeout 10m

  e2e-deploy-windows:
    executor:
      name: win/server-2022
      version: 2024.04.1
    environment:
      OKTETO_CONTEXT: https://okteto.integration.dev.okteto.net
      OKTETO_APPS_SUBDOMAIN: integration.dev.okteto.net
      OKTETO_NAMESPACE_PREFIX: integration
      OKTETO_SKIP_CLUSTER_CLI_VERSION: true
    steps:
      - checkout:
          method: blobless
      - restore_cache:
          keys:
            - v5-pkg-cache-windows-1-15-{{ checksum "go.sum" }}
      - attach_workspace:
          at: .\artifacts
      - run:
          name: Install kubectl and helm
          command: |
            go version
            choco install kubernetes-cli -y
            choco install kubernetes-helm --version 3.16.4 -y
      - run:
          name: Run deploy integration tests
          environment:
            OKTETO_SKIP_CLEANUP: "true"
          command: |
            $env:OKTETO_PATH="$($HOME)\project\artifacts\bin\okteto.exe"
            $env:Path+=";$($HOME)\project\artifacts\bin"
            $env:SSH_AUTH_SOCK = (Get-Command ssh-agent).Definition -replace 'ssh-agent.exe','ssh-agent.sock'
            # This command exports a variable to use the CLI built in the commit, so the test runs against the branch code
            $env:OKTETO_CLI_IMAGE="okteto.global/cli-e2e:$env:CIRCLE_SHA1"
            & "$($HOME)\project\artifacts\bin\okteto.exe" context use $env:OKTETO_CONTEXT --token $env:OKTETO_API_INTEGRATION_TOKEN
            go test github.com/okteto/okteto/integration/deploy -tags="integration" --count=1 -v -timeout 20m

  e2e-okteto-test-windows:
    executor:
      name: win/server-2022
      version: 2024.04.1
    environment:
      OKTETO_CONTEXT: https://okteto.integration.dev.okteto.net
      OKTETO_APPS_SUBDOMAIN: integration.dev.okteto.net
      OKTETO_NAMESPACE_PREFIX: integration
      OKTETO_SKIP_CLUSTER_CLI_VERSION: true
    steps:
      - checkout:
          method: blobless
      - restore_cache:
          keys:
            - v5-pkg-cache-windows-1-15-{{ checksum "go.sum" }}
      - attach_workspace:
          at: .\artifacts
      - run:
          name: Install kubectl and helm
          command: |
            go version
            choco install kubernetes-cli -y
            choco install kubernetes-helm -y
      - run:
          name: Run okteto test integration tests
          environment:
            OKTETO_SKIP_CLEANUP: "true"
          command: |
            $env:OKTETO_PATH="$($HOME)\project\artifacts\bin\okteto.exe"
            $env:Path+=";$($HOME)\project\artifacts\bin"
            $env:SSH_AUTH_SOCK = (Get-Command ssh-agent).Definition -replace 'ssh-agent.exe','ssh-agent.sock'
            # This command exports a variable to use the CLI built in the commit, so the test runs against the branch code
            $env:OKTETO_CLI_IMAGE="okteto.global/cli-e2e:$env:CIRCLE_SHA1"
            & "$($HOME)\project\artifacts\bin\okteto.exe" context use $env:OKTETO_CONTEXT --token $env:OKTETO_API_INTEGRATION_TOKEN
            go test github.com/okteto/okteto/integration/test -tags="integration" --count=1 -v -timeout 20m

  e2e-up-windows:
    executor:
      name: win/server-2022
      version: 2024.04.1
    environment:
      OKTETO_CONTEXT: https://okteto.integration.dev.okteto.net
      OKTETO_APPS_SUBDOMAIN: integration.dev.okteto.net
      OKTETO_NAMESPACE_PREFIX: integration
      OKTETO_SKIP_CLUSTER_CLI_VERSION: true
    steps:
      - checkout:
          method: blobless
      - restore_cache:
          keys:
            - v5-pkg-cache-windows-1-15-{{ checksum "go.sum" }}
      - attach_workspace:
          at: .\artifacts
      - run:
          name: Install kubectl and helm
          command: |
            go version
            choco install kubernetes-cli -y
            choco install kubernetes-helm -y
      - run:
          name: Run up integration tests
          environment:
            OKTETO_SKIP_CLEANUP: "true"
          command: |
            $env:OKTETO_PATH="$($HOME)\project\artifacts\bin\okteto.exe"
            $env:Path+=";$($HOME)\project\artifacts\bin"
            $env:SSH_AUTH_SOCK = (Get-Command ssh-agent).Definition -replace 'ssh-agent.exe','ssh-agent.sock'
            $env:OKTETO_CLI_IMAGE="okteto.global/cli-e2e:$env:CIRCLE_SHA1"
            echo OKTETO_CLI_IMAGE=$env:OKTETO_CLI_IMAGE
            & "$($HOME)\project\artifacts\bin\okteto.exe" context use $env:OKTETO_CONTEXT --token $env:OKTETO_API_INTEGRATION_TOKEN
            go test github.com/okteto/okteto/integration/up -tags="integration" --count=1 -v -timeout 45m

  e2e-gateway-windows:
    executor:
      name: win/server-2022
      version: 2024.04.1
    environment:
      OKTETO_CONTEXT: https://okteto.integration.dev.okteto.net
      OKTETO_APPS_SUBDOMAIN: integration.dev.okteto.net
      OKTETO_NAMESPACE_PREFIX: integration
      OKTETO_SKIP_CLUSTER_CLI_VERSION: true
    steps:
      - checkout:
          method: blobless
      - restore_cache:
          keys:
            - v5-pkg-cache-windows-1-15-{{ checksum "go.sum" }}
      - attach_workspace:
          at: .\artifacts
      - run:
          name: Install kubectl and helm
          command: |
            go version
            choco install kubernetes-cli -y
            choco install kubernetes-helm -y
      - run:
          name: Run gateway integration tests
          environment:
            OKTETO_SKIP_CLEANUP: "true"
          command: |
            $env:OKTETO_PATH="$($HOME)\project\artifacts\bin\okteto.exe"
            $env:Path+=";$($HOME)\project\artifacts\bin"
            $env:OKTETO_CLI_IMAGE="okteto.global/cli-e2e:$env:CIRCLE_SHA1"
            echo OKTETO_CLI_IMAGE=$env:OKTETO_CLI_IMAGE
            & "$($HOME)\project\artifacts\bin\okteto.exe" context use $env:OKTETO_CONTEXT --token $env:OKTETO_API_INTEGRATION_TOKEN
            go test github.com/okteto/okteto/integration/gateway -tags="integration" --count=1 -v -timeout 30m

  push-image-tag:
    executor: golang-ci
    steps:
      - checkout:
          method: full
      - run: *docker-login
      - run: *github-packages-login
      - run: ./scripts/ci/push-image.sh "$CIRCLE_TAG" "linux/amd64,linux/arm64"
      - run: trivy image --db-repository public.ecr.aws/aquasecurity/trivy-db:2 --java-db-repository public.ecr.aws/aquasecurity/trivy-java-db:1 --no-progress ghcr.io/okteto/okteto:$CIRCLE_TAG

  push-image-dev:
    executor: golang-ci
    steps:
      - checkout:
          method: full
      - run: *docker-login
      - run: *github-packages-login
      - run: ./scripts/ci/push-image.sh "$CIRCLE_TAG",dev "linux/amd64,linux/arm64"
      - run: trivy image --db-repository public.ecr.aws/aquasecurity/trivy-db:2 --java-db-repository public.ecr.aws/aquasecurity/trivy-java-db:1 --no-progress ghcr.io/okteto/okteto:dev

  push-image-master:
    executor: golang-ci
    steps:
      - checkout:
          method: full
      - run: *docker-login
      - run: *github-packages-login
      - run: ./scripts/ci/push-image.sh "master" "linux/amd64,linux/arm64"
      - run: trivy image --db-repository public.ecr.aws/aquasecurity/trivy-db:2 --java-db-repository public.ecr.aws/aquasecurity/trivy-java-db:1 --no-progress ghcr.io/okteto/okteto:master

  upload-static-job:
    executor: golang-ci
    steps:
      - checkout:
          method: blobless
      - run: *init-gcloud
      - run: 'gsutil -m -h "Cache-Control: no-store" -h "Content-Type: text/x-sh" cp ./scripts/get-okteto.sh gs://get.okteto.com/get-okteto.sh'

  release-brew-formula:
    executor: golang-ci
    steps:
      - checkout:
          method: blobless
      - attach_workspace:
          at: ./artifacts
      - run: *init-gcloud
      - add_ssh_keys:
          fingerprints:
            # This key belongs to oktetobot user in GitHub
            - SHA256:+wgdECJJEEyF/iyl8Y8EV/tpOEQIv6zZ/0LRqRChS18
      - run:
          name: Update brew formula
          command: |
            sha=$(cat ./artifacts/bin/okteto-Darwin-x86_64.sha256 | awk '{print $1}')
            sha_arm=$(cat ./artifacts/bin/okteto-Darwin-arm64.sha256 | awk '{print $1}')
            ./scripts/update_homebrew_formula.sh $CIRCLE_TAG $sha $sha_arm
            pushd homebrew-cli
            git push git@github.com:okteto/homebrew-cli.git master

  release-gh-actions:
    executor: golang-ci
    steps:
      - checkout:
          method: full
      - run: *init-gcloud
      - add_ssh_keys:
          fingerprints:
            # This key belongs to oktetobot user in GitHub
            - SHA256:+wgdECJJEEyF/iyl8Y8EV/tpOEQIv6zZ/0LRqRChS18
      - run:
          name: Auto-update-actions
          command: ./scripts/ci/release-github-actions.sh $CIRCLE_TAG

  release-job:
    executor: golang-ci
    steps:
      - checkout
      - attach_workspace:
          at: ./artifacts
      - run: *init-gcloud
      - run: ./scripts/ci/release.sh

  release-branch-job:
    executor: golang-ci
    steps:
      - checkout:
          method: full
      - add_ssh_keys:
          fingerprints:
            # This key belongs to oktetobot user in GitHub
            - SHA256:+wgdECJJEEyF/iyl8Y8EV/tpOEQIv6zZ/0LRqRChS18
      - run: ./scripts/ci/release-branch.sh

workflows:
  # upload-static runs on every merge to master
  upload-static:
    when:
      equal: ["master", <<pipeline.git.branch>>]
    jobs:
      - upload-static-job:
          context: GKE
  # lint-build-test runs on every push to a branch and when merge to master
  # unit tests are run on every push and e2e is run when merging to master
  lint-build-test:
    when:
      not:
        or:
          - equal: [scheduled_pipeline, << pipeline.trigger_source >>]
          # when workflows from GHA are triggered, do not re-trigger this workflow
          - equal: ["run-e2e-windows", << pipeline.parameters.GHA_Meta >>]
          - equal: ["run-e2e", << pipeline.parameters.GHA_Meta >>]
          - equal: ["run-e2e-unix", << pipeline.parameters.GHA_Meta >>]
    jobs:
      - golangci-lint
      - build-binaries:
          requires:
            - "golangci-lint"
          filters:
            branches:
              ignore: *release-branch-regex
            tags:
              ignore: /.*/
      - run-unit-test:
          requires:
            - "golangci-lint"
          filters:
            branches:
              ignore: *release-branch-regex
            tags:
              ignore: /.*/
      - run-windows-unit-test:
          requires:
            - "golangci-lint"
          filters:
            branches:
              ignore: *release-branch-regex
            tags:
              ignore: /.*/
      - test-e2e-setup:
          requires:
            - build-binaries
          filters:
            branches:
              only:
                - master
      - check-schema:
          requires:
            - "build-binaries"
      - e2e-build-windows:
          requires:
            - test-e2e-setup
          filters:
            branches:
              only:
                - master
      - e2e-deploy-windows:
          requires:
            - test-e2e-setup
          filters:
            branches:
              only:
                - master
      - e2e-up-windows:
          requires:
            - test-e2e-setup
          filters:
            branches:
              only:
                - master
      - e2e-okteto-test-windows:
          requires:
            - test-e2e-setup
          filters:
            branches:
              only:
                - master
      - e2e-gateway-windows:
          requires:
            - test-e2e-setup
          filters:
            branches:
              only:
                - master
      - e2e-build:
          requires:
            - test-e2e-setup
          filters:
            branches:
              only:
                - master
      - e2e-deploy:
          requires:
            - test-e2e-setup
          filters:
            branches:
              only:
                - master
      - e2e-up:
          requires:
            - test-e2e-setup
          filters:
            branches:
              only:
                - master
      - e2e-actions:
          requires:
            - test-e2e-setup
          filters:
            branches:
              only:
                - master
      - e2e-okteto:
          requires:
            - test-e2e-setup
          filters:
            branches:
              only:
                - master
      - e2e-okteto-test:
          requires:
            - test-e2e-setup
          filters:
            branches:
              only:
                - master
      - e2e-gateway:
          requires:
            - test-e2e-setup
          filters:
            branches:
              only:
                - master
      - test-release:
          context:
            - GKE
          requires:
            - build-binaries
          filters:
            tags:
              ignore: /.*/
            branches:
              ignore:
                - master
                - *release-branch-regex
      - push-image-master:
          context:
            - internal-tooling
          requires:
            - build-binaries
          filters:
            branches:
              only: master

  # release-branch workflow is triggered when branch name is "release-*", ignoring any tag
  release-branch:
    when:
      matches:
        pattern: *release-branch-regex
        value: << pipeline.git.branch >>
    jobs:
      - build-binaries:
          filters:
            tags:
              ignore: /.*/
      - run-unit-test:
          filters:
            tags:
              ignore: /.*/
      - run-windows-unit-test:
          filters:
            tags:
              ignore: /.*/
      - test-e2e-setup:
          requires:
            - build-binaries
      - e2e-build:
          requires:
            - test-e2e-setup
      - e2e-deploy:
          requires:
            - test-e2e-setup
      - e2e-up:
          requires:
            - test-e2e-setup
      - e2e-actions:
          requires:
            - test-e2e-setup
      - e2e-okteto:
          requires:
            - test-e2e-setup
      - e2e-okteto-test:
          requires:
            - test-e2e-setup
      - e2e-gateway:
          requires:
            - test-e2e-setup
      - release-branch-job:
          requires:
            - build-binaries
            - e2e-build
            - e2e-deploy
            - e2e-up
            - e2e-actions
            - e2e-okteto
            - e2e-gateway
            - run-unit-test
            - run-windows-unit-test

  # release-dev is a nightly run on master branch
  release-dev:
    when:
      and:
        - equal: [scheduled_pipeline, << pipeline.trigger_source >>]
        - equal: ["release-dev", << pipeline.schedule.name >>]
    jobs:
      - build-binaries
      - run-unit-test
      - run-windows-unit-test
      - push-image-dev:
          context:
            - internal-tooling
          requires:
            - build-binaries
      - release-job:
          context: GKE
          requires:
            - build-binaries
            - push-image-dev

  # release workflow is triggered when the tag for release is pushed
  release:
    when:
      not:
        equal: [scheduled_pipeline, << pipeline.trigger_source >>]
    jobs:
      - build-binaries:
          filters:
            branches:
              ignore: /.*/
            tags:
              only:
                - *release-regex
      - run-unit-test:
          filters:
            branches:
              ignore: /.*/
            tags:
              ignore: *release-regex
      - run-windows-unit-test:
          filters:
            branches:
              ignore: /.*/
            tags:
              ignore: *release-regex
      - push-image-tag:
          context:
            - internal-tooling
          requires:
            - build-binaries
          filters:
            branches:
              ignore: /.*/
            tags:
              only:
                - *release-regex
      - release-job:
          context: GKE
          requires:
            - build-binaries
            - push-image-tag
          filters:
            branches:
              ignore: /.*/
            tags:
              only:
                - *release-regex
      - release-gh-actions:
          context: GKE
          requires:
            - release-job
          filters:
            branches:
              ignore: /.*/
            tags:
              only: /^\d+\.\d+\.\d+$/
      - release-brew-formula:
          context: GKE
          requires:
            - release-job
          filters:
            branches:
              ignore: /.*/
            tags:
              only: /^\d+\.\d+\.\d+$/

  # run-e2e is triggered by okteto-bot via Github Actions when adding the e2e label to the PR
  # e2e tests are run for both platformas, windows and unix
  run-e2e:
    when:
      equal: ["run-e2e", << pipeline.parameters.GHA_Meta >>]
    jobs:
      - build-binaries
      - test-e2e-setup:
          requires:
            - build-binaries
      - e2e-build:
          requires:
            - test-e2e-setup
      - e2e-deploy:
          requires:
            - test-e2e-setup
      - e2e-up:
