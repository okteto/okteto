name: Trigger CircleCI e2e (reusable)

on:
  workflow_call:
    inputs:
      gha_meta:
        description: CircleCI pipeline parameter (run-e2e, run-e2e-unix, run-e2e-windows)
        required: true
        type: string
      branch:
        description: PR head branch name
        required: true
        type: string
      pr_number:
        description: Pull request number
        required: true
        type: string
      cancel_only:
        description: Only cancel active runs, do not trigger a new one
        required: false
        type: boolean
        default: false
    secrets:
      CCI_TOKEN:
        required: true

jobs:
  trigger:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ inputs.gha_meta }}-${{ inputs.pr_number }}
      cancel-in-progress: true
    steps:
      - name: Debounce (wait 2 min)
        if: ${{ !inputs.cancel_only }}
        run: sleep 120

      - name: Cancel active CircleCI runs for this branch
        run: |
          PROJECT_SLUG="gh/${{ github.repository }}"

          PIPELINE_IDS=$(curl -sf -H "Circle-Token: ${{ secrets.CCI_TOKEN }}" \
            "https://circleci.com/api/v2/project/${PROJECT_SLUG}/pipeline?branch=${{ inputs.branch }}" 2>/dev/null \
            | jq -r '.items[].id' 2>/dev/null || true)

          if [ -z "$PIPELINE_IDS" ]; then
            echo "No CircleCI pipelines found for branch ${{ inputs.branch }}"
            exit 0
          fi

          for PIPELINE_ID in $PIPELINE_IDS; do
            WORKFLOW_IDS=$(curl -sf -H "Circle-Token: ${{ secrets.CCI_TOKEN }}" \
              "https://circleci.com/api/v2/pipeline/${PIPELINE_ID}/workflow" 2>/dev/null \
              | jq -r --arg name "${{ inputs.gha_meta }}" \
                '.items[] | select(.name == $name) | select(.status == "running" or .status == "on_hold" or .status == "failing") | .id' \
              2>/dev/null || true)

            for WORKFLOW_ID in $WORKFLOW_IDS; do
              echo "Canceling workflow ${WORKFLOW_ID} from pipeline ${PIPELINE_ID}"
              curl -sf -X POST -H "Circle-Token: ${{ secrets.CCI_TOKEN }}" \
                "https://circleci.com/api/v2/workflow/${WORKFLOW_ID}/cancel" || true
            done
          done

      - name: Trigger CircleCI pipeline
        if: ${{ !inputs.cancel_only }}
        uses: CircleCI-Public/trigger-circleci-pipeline-action@v1.2.0
        with:
          GHA_Meta: ${{ inputs.gha_meta }}
        env:
          CCI_TOKEN: ${{ secrets.CCI_TOKEN }}
